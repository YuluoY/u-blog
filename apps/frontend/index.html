<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U-Blog</title>
    <script>
      (function () {
        // 记录 splash 开始时间，供 main.ts 计算最短展示时长
        window.__splashStart = Date.now();
        try {
          var t = localStorage.getItem('u-blog-theme');
          if (t === 'dark' || t === 'light' || t === 'default') {
            document.documentElement.setAttribute('theme', t);
            document.documentElement.classList.toggle('dark', t === 'dark');
          }
          var v = localStorage.getItem('u-blog-visual-style');
          if (v === 'glass') {
            document.documentElement.setAttribute('theme-style', 'glass');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- 首屏加载动画：Logo + 文字逐字动画 + 进度线 + 上下帘幕滑出 -->
    <div id="splash">
      <div class="splash-half splash-top"></div>
      <div class="splash-half splash-bottom"></div>
      <div class="splash-center">
        <!-- Logo 图标 -->
        <img class="splash-icon" src="/logo.svg" alt="" width="56" height="50" />
        <!-- 品牌文字逐字动画 -->
        <div class="splash-text">
          <span style="--i:0">U</span><span class="splash-dash" style="--i:1">-</span><span style="--i:2">B</span><span style="--i:3">l</span><span style="--i:4">o</span><span style="--i:5">g</span>
        </div>
        <!-- 底部进度线 -->
        <div class="splash-progress"><div class="splash-progress-bar"></div></div>
      </div>
    </div>
    <style>
      /* ===== 首屏加载帘幕 — 纯 CSS，零依赖 ===== */
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        pointer-events: none;
      }

      /* --- 上下帘幕 --- */
      .splash-half {
        position: absolute; left: 0; right: 0; height: 50%;
        background: #ffffff;
        transition: transform 1.2s cubic-bezier(.22,1,.36,1);
        will-change: transform;
      }
      .splash-top    { top: 0; }
      .splash-bottom { bottom: 0; }

      /* --- 居中内容容器 --- */
      .splash-center {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        display: flex; flex-direction: column; align-items: center; gap: 16px;
        transition: opacity .5s ease, transform .8s cubic-bezier(.22,1,.36,1);
      }

      /* --- Logo 弹入 --- */
      .splash-icon {
        width: 56px; height: 50px;
        animation: splash-icon-in .6s cubic-bezier(.34,1.56,.64,1) both;
      }
      @keyframes splash-icon-in {
        0%   { opacity: 0; transform: scale(0) rotate(-30deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }

      /* --- 文字逐字弹出 --- */
      .splash-text {
        display: flex; align-items: baseline; gap: 2px;
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 28px; font-weight: 700; letter-spacing: 2px;
        color: #2c3e50;
      }
      .splash-text span {
        display: inline-block;
        opacity: 0;
        animation: splash-letter .4s cubic-bezier(.34,1.56,.64,1) both;
        animation-delay: calc(.25s + var(--i) * .08s);
      }
      .splash-dash { margin: 0 1px; }
      @keyframes splash-letter {
        0%   { opacity: 0; transform: translateY(20px) scale(.5); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* --- 进度线 --- */
      .splash-progress {
        width: 120px; height: 3px; border-radius: 3px;
        background: rgba(0,0,0,.08);
        overflow: hidden;
        margin-top: 4px;
      }
      .splash-progress-bar {
        width: 100%; height: 100%; border-radius: 3px;
        background: linear-gradient(90deg, #4f7cf7, #6dd5fa, #4f7cf7);
        background-size: 200% 100%;
        transform-origin: left;
        animation: splash-bar-fill 1.4s cubic-bezier(.4,0,.2,1) both,
                   splash-bar-shimmer 1s linear infinite;
      }
      @keyframes splash-bar-fill {
        0%   { transform: scaleX(0); }
        60%  { transform: scaleX(.7); }
        100% { transform: scaleX(1); }
      }
      @keyframes splash-bar-shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* --- 暗色主题 --- */
      html[theme="dark"] .splash-half { background: #141414; }
      html[theme="dark"] .splash-text { color: #e0e0e0; }
      html[theme="dark"] .splash-progress { background: rgba(255,255,255,.08); }
      html[theme="dark"] .splash-progress-bar {
        background: linear-gradient(90deg, #5b8def, #6dd5fa, #5b8def);
        background-size: 200% 100%;
      }

      /* --- 打开态：帘幕滑出 + 内容缩小消失 --- */
      #splash.open .splash-top    { transform: translateY(-100%); }
      #splash.open .splash-bottom { transform: translateY(100%); }
      #splash.open .splash-center { opacity: 0; transform: translate(-50%, -50%) scale(.8); }

      /* --- 完全隐藏 --- */
      #splash.done { display: none; }
    </style>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
