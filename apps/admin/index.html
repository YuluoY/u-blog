<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U-Blog Admin</title>
  </head>
  <body>
    <script>
      (function(){
        var t=localStorage.getItem('u-blog-admin-theme');
        var f=localStorage.getItem('u-blog-theme');
        var next=t==='dark'||t==='light'?t:(f==='dark'?'dark':(f==='light'||f==='default'?'light':null));
        if(next==='dark'||next==='light')document.documentElement.setAttribute('data-theme',next);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
