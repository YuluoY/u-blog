# =====================================================================
# u-blog Docker Compose — 全量 Docker 部署
# 服务：PostgreSQL 15 + Redis 7 + Backend + Frontend + Admin + Nginx
# 使用方法：cp .env.example .env → 编辑 .env → docker compose up -d
# 环境变量从项目根目录 .env 文件自动读取
# =====================================================================

services:
  # ---- PostgreSQL 15 ----
  postgres:
    image: postgres:15-alpine
    container_name: ublog-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_USER: ${DB_USERNAME:-ublog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Ublog2024!}
      POSTGRES_DB: ${DB_DATABASE:-ublog}
    command: ["postgres", "-c", "timezone=Asia/Shanghai"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ublog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ublog-network

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: ublog-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    command: redis-server --appendonly no
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ublog-network

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ublog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-ublog}
      DB_PASSWORD: ${DB_PASSWORD:-Ublog2024!}
      DB_DATABASE: ${DB_DATABASE:-ublog}
      DATABASE_URL: postgresql://${DB_USERNAME:-ublog}:${DB_PASSWORD:-Ublog2024!}@postgres:5432/${DB_DATABASE:-ublog}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      TRANSPORT_KEY: ${TRANSPORT_KEY:-}
      OPENCLAW_URL: ${OPENCLAW_URL:-}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-}
      SITE_URL: ${SITE_URL:-}
      INIT_SEED_DATA: ${INIT_SEED_DATA:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      SO360_PUSH_ENABLED: ${SO360_PUSH_ENABLED:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads:/app/apps/backend/public/uploads
      - static:/app/apps/backend/public/static
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/registration-status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ublog-network

  # ---- Prerender SEO 服务 ----
  prerender:
    build:
      context: ./apps/prerender
      dockerfile: Dockerfile
    container_name: ublog-prerender
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      PRERENDER_PORT: 3010
      BACKEND_URL: http://backend:3000
    volumes:
      - prerender_cache:/app/cache
    expose:
      - "3010"
    networks:
      - ublog-network

  # ---- Frontend SPA ----
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: runner
    container_name: ublog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - uploads:/usr/share/nginx/html/uploads:ro
    expose:
      - "80"
    networks:
      - ublog-network

  # ---- Admin SPA ----
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: runner
    container_name: ublog-admin
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - ublog-network

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:alpine
    container_name: ublog-nginx
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/etc/nginx/entrypoint.sh"]
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      admin:
        condition: service_started
      prerender:
        condition: service_started
    environment:
      ENABLE_SSL: ${ENABLE_SSL:-false}
      DOMAIN: ${DOMAIN:-localhost}
      SSL_CERT: ${SSL_CERT:-/etc/nginx/ssl/cert.crt}
      SSL_KEY: ${SSL_KEY:-/etc/nginx/ssl/cert.key}
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./deploy/nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/templates/nginx.https.conf:ro
      - ./deploy/nginx/nginx.http.conf:/etc/nginx/templates/nginx.http.conf:ro
      - ${SSL_DIR:-./deploy/nginx/ssl}:/etc/nginx/ssl:ro
      - uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - ublog-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  static:
    driver: local
  prerender_cache:
    driver: local

networks:
  ublog-network:
    driver: bridge
