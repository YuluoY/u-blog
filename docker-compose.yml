# =====================================================================
# u-blog Docker Compose — 完整生产部署配置
# 服务：PostgreSQL + Backend + Nginx（前端+后台+反向代理）
# =====================================================================

services:
  # ---- PostgreSQL 数据库 ----
  postgres:
    image: postgres:16-alpine
    container_name: ublog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_DATABASE:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ublog-network

  # ---- Backend API (Express + TypeORM) ----
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: ublog-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-admin}@postgres:5432/${DB_DATABASE:-postgres}
      JWT_SECRET: ${JWT_SECRET:-JWT_SECRET_PROD_CHANGE_ME}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://118.25.178.227,http://118.25.178.227:8080}
      INIT_SEED_DATA: ${INIT_SEED_DATA:-false}
    volumes:
      - backend_uploads:/app/apps/backend/public/uploads
      - backend_static:/app/apps/backend/public/static
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/registration-status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ublog-network

  # ---- Nginx (前端 + 后台管理 + 反向代理) ----
  nginx:
    image: nginx:alpine
    container_name: ublog-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html/frontend
      - admin_dist:/usr/share/nginx/html/admin
      - backend_uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - ublog-network

  # ---- Frontend 构建器（仅构建，输出到 volume） ----
  frontend-builder:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: builder
    container_name: ublog-frontend-builder
    volumes:
      - frontend_dist:/output
    entrypoint: ["sh", "-c", "cp -r /app/apps/frontend/dist/* /output/ && echo 'Frontend build copied'"]
    networks:
      - ublog-network

  # ---- Admin 构建器（仅构建，输出到 volume） ----
  admin-builder:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: builder
    container_name: ublog-admin-builder
    volumes:
      - admin_dist:/output
    entrypoint: ["sh", "-c", "cp -r /app/apps/admin/dist/* /output/ && echo 'Admin build copied'"]
    networks:
      - ublog-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  backend_static:
    driver: local
  frontend_dist:
    driver: local
  admin_dist:
    driver: local

networks:
  ublog-network:
    driver: bridge
