# =====================================================================
# u-blog 主 Nginx 配置（反向代理 + 负载均衡 + 安全优化）
# 同一服务器上承载前端、后台管理、后端API
# =====================================================================

# 后端API上游（预留负载均衡扩展）
upstream backend_api {
    # 轮询策略（可更换为 least_conn / ip_hash）
    least_conn;
    server backend:3000;
    # 未来扩展多实例时取消注释：
    # server backend-2:3000;
    keepalive 32;
}

# ---- Gzip 压缩 ----
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/woff2;

# ---- 速率限制区域 ----
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=50r/s;

# ====== 前端 (博客主站) — 端口 80/443 ======
server {
    listen 80;
    server_name 118.25.178.227;

    root /usr/share/nginx/html/frontend;
    index index.html;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- 静态资源缓存 ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        limit_req zone=static_limit burst=100 nodelay;
    }

    # ---- API 反向代理 ----
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 连接池优化
        proxy_set_header Connection "";
    }

    # ---- 上传文件代理 ----
    location /uploads/ {
        proxy_pass http://backend_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- SPA 路由回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 错误页 ----
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ====== 后台管理面板 — 端口 8080 ======
server {
    listen 8080;
    server_name 118.25.178.227;

    root /usr/share/nginx/html/admin;
    index index.html;

    # ---- 安全头 ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- 静态资源缓存 ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- API 反向代理 ----
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection "";
    }

    # ---- 上传文件代理 ----
    location /uploads/ {
        proxy_pass http://backend_api/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ---- SPA 路由回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
