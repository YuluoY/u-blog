# u-blog SSL 配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name uluo.cloud www.uluo.cloud;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/uluo.cloud/uluo.cloud_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/uluo.cloud/uluo.cloud.key;

    # SSL 优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # 现代加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Cloudflare 真实 IP 转发
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # 文件上传大小限制
    client_max_body_size 50m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== 应用路由 ==========

    # SSE 聊天流：关闭缓冲，避免流式响应被聚合后延迟推送
    location = /api/chat {
        proxy_pass http://127.0.0.1:3000/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # API 反向代理（去除 /api 前缀）
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # 普通 JSON API 开启缓冲，降低上游阻塞与慢客户端回压
        proxy_buffering on;
        proxy_request_buffering on;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # 上传资源
    location ^~ /uploads/ {
        alias /var/www/u-blog/apps/backend/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 管理后台
    location ^~ /admin/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        alias /var/www/u-blog/apps/admin/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    # ========== 前端 SPA ==========

    root /var/www/u-blog/apps/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 静态资源长期缓存（带 content hash 的构建产物）
    # gzip_static：优先返回 Vite 构建生成的 .gz 预压缩文件
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # 健康检查
    location /cdn-cgi/health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 禁止访问隐藏文件
    location ~ /\.(?!well-known) {
        deny all;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name uluo.cloud www.uluo.cloud;
    return 301 https://uluo.cloud$request_uri;
}
